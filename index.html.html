      const date = new Date(todayKey());
      date.setDate(date.getDate() + days);

    function weekdayLabel(dateText) {

    function workdayCalendarKeys() {
      const dates = [];
      let offset = 0;
      while (dates.length < 5) {
        const key = addDaysKey(offset);
        const day = new Date(key).getDay();
        if (day >= 1 && day <= 5) dates.push(key);
        offset += 1;
      }
      return dates;

      if (Number.isNaN(founded.getTime()) || founded > today) return "예비창업자";
      const threeYearsLater = new Date(founded);

      return today < threeYearsLater ? "3년 이내" : "3년 이상";

      for (let index = 0; index < ids.length; index += target) {

              {companyLines.map((line, lineIndex) => (
                <div className="company-line" key={lineIndex}>
                  {line.map((item) => {
                    const company = item.company;
                    return (
                    <section className={`company-column ${companyDrag?.companyId === company.id ? "drag-target" : ""}`} key={company.id} data-company-id={company.id}>
                  <div className="company-top" onPointerDown={(event) => startCompanyMove(event, company)}>
                    <div className="company-controls">
                      {company.contractEnded && <span className="ended-pill">종료</span>}
                      {company.crmUrl && <a className="crm-chip" href={safeUrl(company.crmUrl)} target="_blank" rel="noreferrer" onPointerDown={(event) => event.stopPropagation()} onClick={(event) => event.stopPropagation()}>CRM</a>}
                    </div>
                    <h3 className="company-name">{company.name}</h3>
                    <div className="badges"><span className="badge">{company.region || "지역 미입력"}</span><span className="badge">{companyAgeLabel(company.foundedDate, company.age)}</span></div>
                    <div className="round-row" onClick={(e) => e.stopPropagation()}>
                      <span className="subtle">현재 회차</span>
                      <div className="stepper">
                        <button className="round-btn" onClick={() => updateCompanyRound(company, company.round - 1)}>−</button>
                        <span className="round-value">{company.round}회차</span>
                        <button className="round-btn" onClick={() => updateCompanyRound(company, company.round + 1)}>＋</button>
                      </div>
                    </div>
                    <div className="contract-row" onClick={(e) => e.stopPropagation()}>
                      <span className="subtle">월 계약 {monthlyDoneCount(company, grantMap)}/{company.monthlyTarget}건</span>
                      <div className="dots">
                        {monthlyStatuses(company, grantMap).map((status, index) => (
                          <button key={index} className={`dot ${status}`} title={statusLabel(status)} />
                        ))}
                      </div>
                    </div>
                  </div>
                  <div className="assignment-list" ref={(node) => { assignmentListRefs.current[company.id] = node; }} onClick={() => selectedGrantId && assignGrant(company.id, selectedGrantId)}>
                    {sortedAssignedGrantIds(company, grantMap).map((grantId, index) => {
                      const grant = grantMap[grantId];
                      if (!grant) return null;
                      return (
                        <React.Fragment key={grantId}>
                          {index > 0 && index % company.monthlyTarget === 0 && (
                            <div className="cycle-divider">연장 구간</div>
                          )}
                          <div className="assigned-tab" data-assignment-index={index} onPointerDown={(e) => startAssignedScheduleDrag(e, company.id, grantId, grant.title)} onClick={(e) => { e.stopPropagation(); setViewingGrant(grant); }}>
                            <div>
                              <div className="assigned-title">{compactAssignedTitle(grant.title)}</div>
                              <div className="assignment-bottom">
                                <span className={ddayClass(grant.deadline)}>{ddayLabel(grant.deadline)}</span>
                                <div className="status-toggle" onPointerDown={(e) => e.stopPropagation()} onClick={(e) => e.stopPropagation()}>
                                  <button className={`status-btn ready ${assignmentStatus(company, grantId) === "ready" ? "active" : ""}`} onClick={(e) => { e.stopPropagation(); updateAssignmentStatus(company.id, grantId, "ready"); }}>준비</button>
                                  <button className={`status-btn done ${assignmentStatus(company, grantId) === "done" ? "active" : ""}`} onClick={(e) => { e.stopPropagation(); updateAssignmentStatus(company.id, grantId, "done"); }}>완료</button>
                                  <button className={`status-btn passed ${assignmentStatus(company, grantId) === "passed" ? "active" : ""}`} onClick={(e) => { e.stopPropagation(); updateAssignmentStatus(company.id, grantId, "passed"); }}>합격</button>
                                </div>
                              </div>
                            </div>
                            <button className="remove" title="제거" onClick={(e) => { e.stopPropagation(); removeAssignment(company.id, grantId); }}>×</button>
                          </div>
                        </React.Fragment>
                      );
                    })}
                    {sortedAssignedGrantIds(company, grantMap).length <= currentCycleStart(company) && (
                      <div className="cycle-empty-space" data-assignment-index={currentCycleStart(company)}></div>
                    )}
                    {!company.assignedGrantIds.length && <div className="drop-empty empty-drop-space"></div>}
                  </div>
                    </section>
                    );
                  })}
                </div>
              ))}
            </div>
            <div className="calendar-resizer" onPointerDown={startCalendarResize} title="일정표 높이 조절" />
            <section className="calendar-panel" style={{ flex: `0 0 ${calendarHeight}px` }}>
              <div className="calendar-head">
                <div>
                  <h2 className="title">스케줄</h2>
                </div>
                <div className="board-actions">
                  <button className="calendar-icon-btn" title="전체 달력" onClick={() => setShowFullCalendar(true)}>▦</button>
                  {schedulePick && <button className="text-btn" onClick={() => setSchedulePick(null)}>선택 취소</button>}
                </div>
              </div>
              <div className="calendar-grid">
                {calendarDays.map((date) => {
                  const dateSchedules = schedules.filter((item) => item.date === date);
                  return (
                    <div className={`calendar-day ${schedulePick ? "selecting" : ""}`} key={date} data-calendar-date={date} onClick={() => addSchedule(date)}>
                      <div className="calendar-date"><span>{date.slice(5)} ({weekdayLabel(date)})</span><span>{date === todayKey() ? "오늘" : ""}</span></div>
                      {dateSchedules.map((item) => {
                        const company = companies.find((target) => target.id === item.companyId);
                        const grant = grantMap[item.grantId];
                        if (!company || !grant) return null;
                        return (
                          <div className="schedule-item" key={item.id} title="클릭하면 일정 삭제" onClick={(e) => { e.stopPropagation(); removeSchedule(item.id); }}>
                            <div className="schedule-company">{company.name}</div>
                            <div className="schedule-title">{compactAssignedTitle(grant.title)}</div>
                            <div className="schedule-meta">{ddayLabel(grant.deadline)}</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </section>
          </main>
          {drag && <div className="drag-preview" style={{ left: drag.x, top: drag.y }}><span className="copy-mark">복사</span><div>{drag.title}</div></div>}
          {companyDrag && <div className="company-drag-preview" style={{ left: companyDrag.x, top: companyDrag.y }}>기업 위치 이동<br />{companyDrag.name}</div>}
          {companyDrag?.marker && <div className="company-insert-marker" style={{ left: companyDrag.marker.left, top: companyDrag.marker.top, height: companyDrag.marker.height }} />}
          {toast && <div className="toast">{toast}</div>}
          {viewingGrant && <GrantDetailModal grant={viewingGrant} onClose={() => setViewingGrant(null)} onEdit={() => { setEditingGrant(viewingGrant); setViewingGrant(null); }} onSelect={() => { setSelectedGrantId(viewingGrant.id); setViewingGrant(null); notify("기업 칸을 클릭해 배정하세요"); }} />}
          {editingGrant && <GrantModal grant={editingGrant} onClose={() => setEditingGrant(null)} onSave={saveGrant} onDelete={editingGrant.id ? deleteGrant : null} />}
          {editingCompany && <CompanyModal company={editingCompany} onClose={() => setEditingCompany(null)} onSave={saveCompany} onDelete={editingCompany.id ? deleteCompany : null} />}
          {showFullCalendar && (
            <div className="modal-backdrop">
              <div className="modal" style={{ width: "900px" }}>
                <h2>전체 일정 달력</h2>
                <div className="full-calendar">
                  {fullCalendarDays.map((date) => {
                    const dateSchedules = schedules.filter((item) => item.date === date);
                    return (
                      <div className="full-calendar-day" key={date}>
                        <div className="calendar-date"><span>{date.slice(5)} ({weekdayLabel(date)})</span><span>{date === todayKey() ? "오늘" : ""}</span></div>
                        {dateSchedules.map((item) => {
                          const company = companies.find((target) => target.id === item.companyId);
                          const grant = grantMap[item.grantId];
                          if (!company || !grant) return null;
                          return (
                            <div className="schedule-item" key={item.id} title="클릭하면 일정 삭제" onClick={() => removeSchedule(item.id)}>
                              <div className="schedule-company">{company.name}</div>
                              <div className="schedule-title">{compactAssignedTitle(grant.title)}</div>
                              <div className="schedule-meta">{ddayLabel(grant.deadline)}</div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
                <div className="modal-actions">
                  <div className="action-right"><button className="text-btn primary" onClick={() => setShowFullCalendar(false)}>닫기</button></div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    function GrantDetailModal({ grant, onClose, onEdit, onSelect }) {
      const openUrl = safeUrl(grant.link);
      return (
        <div className="modal-backdrop">
          <div className="modal">
            <h2>지원사업 정보</h2>
            <div className="detail-list">
              <div className="detail-item"><span className="detail-label">사업명</span><div className="detail-value">{grant.title || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">마감일</span><div className="detail-value">{grant.deadline || "-"} {grant.deadline ? `(${ddayLabel(grant.deadline)})` : ""}</div></div>
              <div className="detail-item"><span className="detail-label">지원 규모</span><div className="detail-value">{grant.budget || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">지원 지역</span><div className="detail-value">{grant.region || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">지원 대상 조건</span><div className="detail-value">{grant.condition || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">공고 링크</span><div className="detail-value">{grant.link || "-"}</div></div>
            </div>
            <div className="modal-actions">
              {openUrl && <a className="link-btn" href={openUrl} target="_blank" rel="noreferrer">공고 열기</a>}
              <div className="action-right">
                <button className="text-btn" onClick={onSelect}>배정 선택</button>
                <button className="text-btn" onClick={onEdit}>수정</button>
                <button className="text-btn primary" onClick={onClose}>닫기</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GrantModal({ grant, onClose, onSave, onDelete }) {
      const [form, setForm] = useState({ title: "", deadline: "", budget: "", region: "", condition: "", link: "", ...grant });
      return (
        <div className="modal-backdrop">
          <div className="modal">
            <h2>{form.id ? "지원사업 수정" : "지원사업 추가"}</h2>
            <div className="form-grid">
              <Field label="사업명"><input value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} /></Field>
              <Field label="마감일"><input type="date" value={form.deadline} onChange={(e) => setForm({ ...form, deadline: e.target.value })} /></Field>
              <Field label="지원 규모"><input value={form.budget} onChange={(e) => setForm({ ...form, budget: e.target.value })} /></Field>
              <Field label="지원 지역"><input value={form.region} onChange={(e) => setForm({ ...form, region: e.target.value })} /></Field>
              <Field label="지원 대상 조건"><textarea value={form.condition} onChange={(e) => setForm({ ...form, condition: e.target.value })} /></Field>
              <Field label="공고 링크"><input value={form.link} onChange={(e) => setForm({ ...form, link: e.target.value })} /></Field>
            </div>
            <div className="modal-actions">
              {onDelete && <button className="text-btn danger" onClick={() => onDelete(form.id)}>삭제</button>}
              <div className="action-right"><button className="text-btn" onClick={onClose}>취소</button><button className="text-btn primary" disabled={!form.title.trim()} onClick={() => onSave(form)}>저장</button></div>
            </div>
          </div>
        </div>
      );
    }
    function CompanyModal({ company, onClose, onSave, onDelete }) {
      const [form, setForm] = useState({ name: "", memo: "", region: "", foundedDate: "", crmUrl: "", round: 1, monthlyTarget: 3, monthlyDone: 0, assignedGrantIds: [], assignmentStatuses: {}, contractEnded: false, ...company });
      return (
        <div className="modal-backdrop">
          <div className="modal">
            <h2>{form.id ? "기업 수정" : "기업 추가"}</h2>
            <div className="form-grid">
              <Field label="기업명"><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} /></Field>
              <Field label="메모"><textarea value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} /></Field>
              <Field label="창업지역"><input value={form.region} onChange={(e) => setForm({ ...form, region: e.target.value })} /></Field>
              <Field label="창립일자"><input type="date" value={form.foundedDate || ""} onChange={(e) => setForm({ ...form, foundedDate: e.target.value })} /></Field>
              <Field label="업력 자동 판정"><input value={companyAgeLabel(form.foundedDate)} readOnly /></Field>
              <Field label="CRM URL"><input value={form.crmUrl || ""} onChange={(e) => setForm({ ...form, crmUrl: e.target.value })} placeholder="https://..." /></Field>
              <Field label="현재 회차"><input type="number" min="1" value={form.round} onChange={(e) => setForm({ ...form, round: e.target.value })} /></Field>
              <Field label="월 계약 건수"><input type="number" min="1" value={form.monthlyTarget} onChange={(e) => setForm({ ...form, monthlyTarget: e.target.value })} /></Field>
              <label className="toggle-label"><input type="checkbox" checked={!!form.contractEnded} onChange={(e) => setForm({ ...form, contractEnded: e.target.checked })} />계약 종료</label>
            </div>
            <div className="modal-actions">
              {onDelete && <button className="text-btn danger" onClick={() => onDelete(form.id)}>삭제</button>}
              <div className="action-right"><button className="text-btn" onClick={onClose}>취소</button><button className="text-btn primary" disabled={!form.name.trim()} onClick={() => onSave(form)}>저장</button></div>
            </div>
          </div>
        </div>
      );
    }
    function Field({ label, children }) {
      return <div className="field"><label>{label}</label>{children}</div>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<StartupGrantBoard />);
  </script>
</body>
</html>
