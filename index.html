    .dot.done { background: #2563eb; border-color: #2563eb; }
    .dot.passed { background: #ec4899; border-color: #ec4899; }

      font-size: 11px;
      line-height: 1;
      padding: 0;

        sorted.push(...ids.slice(index, index + target).sort((a, b) => {

          const { data, error } = result;
          if (error) throw error;
          return data?.data || null;
        } catch (error) {
          console.warn("Supabase read failed", error);
        }
      }
      const api = window.storage || memoryStorage;
      try {
        const value = await api.get(STORAGE_KEY);
        if (!value) return null;
        return typeof value === "string" ? JSON.parse(value) : value;
      } catch { return null; }
    }
    async function storageWrite(data) {

      }
      if (supabaseClient) {
        try {
          const { error } = await supabaseClient
            .from("app_state")
            .upsert({
              id: STORAGE_KEY,
              data: payload,
              updated_at: new Date().toISOString()
            });
          if (error) throw error;
          return;
        } catch (error) {
          console.warn("Supabase write failed", error);
        }

      const api = window.storage || memoryStorage;
      try { await api.set(STORAGE_KEY, JSON.stringify(payload)); } catch {}

    function StartupGrantBoard() {
      const [grants, setGrants] = useState(seedGrants);

      const [showPastGrants, setShowPastGrants] = useState(false);
      const [schedules, setSchedules] = useState([]);
      const [logs, setLogs] = useState([]);
      const [schedulePick, setSchedulePick] = useState(null);

            setGrants(saved.grants);

            setSchedules(saved.schedules || []);
            setLogs(saved.logs || []);
            if (saved.calendarHeight) setCalendarHeight(Math.max(190, saved.calendarHeight));
          }
          setLoaded(true);
        });
      }, []);
      useEffect(() => { if (loaded) storageWrite({ grants, companies, schedules, logs, calendarHeight }); }, [grants, companies, schedules, logs, calendarHeight, loaded]);
      useEffect(() => {
        if (!toast) return;
        const timer = window.setTimeout(() => setToast(""), 1800);
        return () => window.clearTimeout(timer);
      }, [toast]);
      const grantMap = useMemo(() => Object.fromEntries(grants.map((grant) => [grant.id, grant])), [grants]);
      const calendarDays = useMemo(() => workdayCalendarKeys(), []);
      const fullCalendarDays = useMemo(() => monthCalendarKeys(fullCalendarBase), [fullCalendarBase]);
      const visibleGrants = useMemo(() => {
        const q = query.trim().toLowerCase();
        const filtered = grants.filter((grant) => {
          const diff = dayDiff(grant.deadline);
          if (!showPastGrants && diff !== null && diff < 0) return false;
          if (showPastGrants && !(diff !== null && diff < 0)) return false;
          if (!q) return true;
          return [grant.title, grant.region, grant.condition, grant.budget].join(" ").toLowerCase().includes(q);
        }).sort((a, b) => (a.deadline || "9999-12-31").localeCompare(b.deadline || "9999-12-31"));
        if (!showPastGrants) return filtered;
        const seenTitles = new Set();
        return filtered.filter((grant) => {
          const key = String(grant.title || "").trim().replace(/\s+/g, " ");
          if (!key || seenTitles.has(key)) return false;
          seenTitles.add(key);
          return true;
        });
      }, [grants, query, showPastGrants]);
      const groupedGrants = useMemo(() => grantCategories.map((category) => ({
        category,
        items: visibleGrants.filter((grant) => grantCategory(grant) === category)
      })), [visibleGrants]);
      const visibleCompanies = useMemo(
        () => companies.filter((company) => {
          if (activeCompanyTab === "log") return false;
          if (activeCompanyTab === "ended") return !!company.contractEnded;
          if (company.contractEnded) return false;
          if (activeCompanyTab === "pocket") return isPocketCompany(company);
          if (activeCompanyTab === "active") return !isPocketCompany(company);
          return true;
        }).sort((a, b) => {
          if (!!a.pinned !== !!b.pinned) return Number(!!b.pinned) - Number(!!a.pinned);
          if (activeCompanyTab !== "all") return 0;
          const aReady = (a.assignedGrantIds || []).some((grantId) => assignmentStatus(a, grantId) === "ready");
          const bReady = (b.assignedGrantIds || []).some((grantId) => assignmentStatus(b, grantId) === "ready");
          return Number(bReady) - Number(aReady);
        }),
        [companies, activeCompanyTab]
      );
      const displayCompanies = useMemo(() => {
        return visibleCompanies.map((company) => ({ type: "company", company }));
      }, [visibleCompanies, companyDrag]);
      const companyLines = useMemo(() => {
        return [
          displayCompanies.filter((_, index) => index % 2 === 0),
          displayCompanies.filter((_, index) => index % 2 === 1)
        ];
      }, [displayCompanies]);
      useEffect(() => {
        if (!loaded || activeCompanyTab === "log") return;
        const timer = window.setTimeout(() => {
          visibleCompanies.forEach((company) => {
            const pageStart = currentCycleStart(company);
            const pageIds = sortedAssignedGrantIds(company, grantMap).slice(pageStart, pageStart + (Number(company.monthlyTarget) || 1));
            const pageReadyIndex = pageIds.findIndex((grantId) => assignmentStatus(company, grantId) === "ready");
            if (pageReadyIndex < 0) return;
            const readyIndex = pageStart + pageReadyIndex;
            const node = assignmentListRefs.current[company.id];
            const child = node?.querySelector?.(`[data-assignment-index="${readyIndex}"]`);
            if (child?.scrollIntoView) child.scrollIntoView({ block: "start" });
            else if (node) node.scrollTop = 0;
          });
        }, 80);
        return () => window.clearTimeout(timer);
      }, [visibleCompanies, grantMap, activeCompanyTab, loaded]);
      function notify(message) { setToast(message); }
      function addLog(action, detail, undo) {
        setLogs((current) => [{ id: uid("log"), time: new Date().toISOString(), action, detail, undo, undone: false }, ...current].slice(0, 300));
      }
      function markLogUndone(id) {
        setLogs((current) => current.map((item) => item.id === id ? { ...item, undone: true, detail: `${item.detail} / 취소됨` } : item));
      }
      function undoLegacyLog(item) {
        const parts = String(item.detail || "").split(" / ").map((value) => value.trim());
        if (item.action === "지원사업 배정" || item.action === "지원사업 제거") {
          const company = companies.find((target) => target.name === parts[0]);
          const grant = grants.find((target) => target.title === parts[1]);
          if (!company || !grant) return false;
          if (item.action === "지원사업 배정") {
            setCompanies((current) => current.map((target) => {
              if (target.id !== company.id) return target;
              const nextStatuses = { ...(target.assignmentStatuses || {}) };
              const nextResults = { ...(target.assignmentResults || {}) };
              const nextSources = { ...(target.assignmentSources || {}) };
              delete nextStatuses[grant.id];
              delete nextResults[grant.id];
              delete nextSources[grant.id];
              return { ...target, assignedGrantIds: (target.assignedGrantIds || []).filter((id) => id !== grant.id), assignmentStatuses: nextStatuses, assignmentResults: nextResults, assignmentSources: nextSources };
            }));
            return true;
          }
          setCompanies((current) => current.map((target) => {
            if (target.id !== company.id || (target.assignedGrantIds || []).includes(grant.id)) return target;
            return {
              ...target,
              assignedGrantIds: [...(target.assignedGrantIds || []), grant.id],
              assignmentStatuses: { ...(target.assignmentStatuses || {}), [grant.id]: "ready" }
            };
          }));
          return true;
        }
        if (item.action === "스케줄 등록" || item.action === "스케줄 삭제") {
          const [date, companyName, grantTitle] = parts;
          const company = companies.find((target) => target.name === companyName);
          const grant = grants.find((target) => target.title === grantTitle);
          if (!date || !company || !grant) return false;
          if (item.action === "스케줄 등록") {
            setSchedules((current) => current.filter((schedule) => !(schedule.date === date && schedule.companyId === company.id && schedule.grantId === grant.id)));
            return true;
          }
          setSchedules((current) => current.some((schedule) => schedule.date === date && schedule.companyId === company.id && schedule.grantId === grant.id)
            ? current
            : [...current, { id: uid("s"), date, companyId: company.id, grantId: grant.id }]);
          return true;
        }
        if (item.action === "기업 추가") {
          const companyName = parts[0];
          setCompanies((current) => current.filter((company) => company.name !== companyName));
          return true;
        }
        return false;
      }
      function undoLog(item) {
        if (!item.undo || item.undone) {
          if (!item.undone && undoLegacyLog(item)) {
            markLogUndone(item.id);
            notify("취소됨");
            return;
          }
          notify(item.undone ? "이미 취소된 기록입니다" : "이 기록은 취소할 수 없습니다");
          return;
        }
        const undo = item.undo;
        if (undo.type === "assignGrant") {
          setCompanies((current) => current.map((company) => {
            if (company.id !== undo.companyId) return company;
            const nextStatuses = { ...(company.assignmentStatuses || {}) };
            const nextResults = { ...(company.assignmentResults || {}) };
            const nextSources = { ...(company.assignmentSources || {}) };
            delete nextStatuses[undo.grantId];
            delete nextResults[undo.grantId];
            delete nextSources[undo.grantId];
            return { ...company, assignedGrantIds: (company.assignedGrantIds || []).filter((id) => id !== undo.grantId), assignmentStatuses: nextStatuses, assignmentResults: nextResults, assignmentSources: nextSources };
          }));
        } else if (undo.type === "removeAssignment") {
          setCompanies((current) => current.map((company) => {
            if (company.id !== undo.companyId || (company.assignedGrantIds || []).includes(undo.grantId)) return company;
            const ids = [...(company.assignedGrantIds || [])];
            ids.splice(Math.max(0, Math.min(undo.index ?? ids.length, ids.length)), 0, undo.grantId);
            const nextStatuses = { ...(company.assignmentStatuses || {}) };
            const nextResults = { ...(company.assignmentResults || {}) };
            const nextSources = { ...(company.assignmentSources || {}) };
            if (undo.status) nextStatuses[undo.grantId] = undo.status;
            if (undo.result) nextResults[undo.grantId] = undo.result;
            if (undo.source) nextSources[undo.grantId] = undo.source;
            return { ...company, assignedGrantIds: ids, assignmentStatuses: nextStatuses, assignmentResults: nextResults, assignmentSources: nextSources };
          }));
        } else if (undo.type === "addSchedule") {
          setSchedules((current) => current.filter((schedule) => schedule.id !== undo.schedule.id));
        } else if (undo.type === "removeSchedule") {
          setSchedules((current) => current.some((schedule) => schedule.id === undo.schedule.id) ? current : [...current, undo.schedule]);
        } else if (undo.type === "saveCompany") {
          setCompanies((current) => undo.isNew ? current.filter((company) => company.id !== undo.company.id) : current.map((company) => company.id === undo.company.id ? undo.company : company));
        } else if (undo.type === "deleteCompany") {
          setCompanies((current) => current.some((company) => company.id === undo.company.id) ? current : [...current, undo.company]);
        } else if (undo.type === "round") {
          setCompanies((current) => current.map((company) => company.id === undo.companyId ? { ...company, round: undo.previousRound } : company));
        } else if (undo.type === "status") {
          setCompanies((current) => current.map((company) => {
            if (company.id !== undo.companyId) return company;
            const nextStatuses = { ...(company.assignmentStatuses || {}) };
            const nextResults = { ...(company.assignmentResults || {}) };

            ) : (
            <React.Fragment>
            <div className="company-row">
              {companyLines.map((line, lineIndex) => (
                <div className="company-line" key={lineIndex}>
                  {line.map((item) => {
                    const company = item.company;
                    return (
                    <section className={`company-column ${companyDrag?.companyId === company.id ? "drag-target" : ""}`} key={company.id} data-company-id={company.id}>
                  <div className="company-top" onPointerDown={(event) => startCompanyMove(event, company)} onDoubleClick={(event) => { event.preventDefault(); event.stopPropagation(); toggleCompanyPinned(company); }}>
                    <div className="company-controls">
                      {company.contractEnded && <span className="ended-pill">종료</span>}
                      {company.crmUrl && <a className="crm-chip" href={safeUrl(company.crmUrl)} target="_blank" rel="noreferrer" onPointerDown={(event) => event.stopPropagation()} onClick={(event) => event.stopPropagation()}>CRM</a>}
                      <a className="crm-chip client-chip" href={customerPageUrl(company.id)} target="_blank" rel="noreferrer" onPointerDown={(event) => event.stopPropagation()} onClick={(event) => event.stopPropagation()}>고객</a>
                    </div>
                    <div className="company-name-row">
                      <h3 className="company-name">{company.name}</h3>
                      {company.pinned && <span className="pin-mark" title="우선 고정">✓</span>}
                    </div>
                    <div className="badges">
                      <span className="badge">{company.region || "지역 미입력"}</span>
                      <span className="badge">{companyAgeLabel(company.foundedDate, company.age)}</span>
                      <div className="dots" onClick={(e) => e.stopPropagation()}>
                        {monthlyStatuses(company, grantMap).map((status, index) => (
                          <button key={index} className={`dot ${status}`} title={statusLabel(status)} />
                        ))}
                      </div>
                    </div>
                    <div className="round-row" onClick={(e) => e.stopPropagation()}>
                      <span className="subtle">현재 회차</span>
                      <div className="stepper">
                        <button className="round-btn" onClick={() => updateCompanyRound(company, company.round - 1)}>−</button>
                        <span className={`round-value ${isPocketCompany(company) ? "pocket" : ""}`}>{roundLabel(company)}</span>
                        <button className="round-btn" onClick={() => updateCompanyRound(company, company.round + 1)}>＋</button>
                      </div>
                    </div>
                    <div className="company-page-switch" onClick={(e) => e.stopPropagation()}>
                      <button className="page-btn" disabled={isPocketCompany(company) || Number(company.round || 0) <= 1} onClick={() => updateCompanyRound(company, company.round - 1)}>‹</button>
                      <button className="page-btn" onClick={() => updateCompanyRound(company, Number(company.round || 0) + 1)}>›</button>
                    </div>
                  </div>
                  <div className={`assignment-list ${sortedAssignedGrantIds(company, grantMap).slice(currentCycleStart(company), currentCycleStart(company) + (Number(company.monthlyTarget) || 1)).length > 0 ? "has-visible-assignments" : ""}`} ref={(node) => { assignmentListRefs.current[company.id] = node; }} onClick={() => selectedGrantId && assignGrant(company.id, selectedGrantId)}>
                    {sortedAssignedGrantIds(company, grantMap).slice(currentCycleStart(company), currentCycleStart(company) + (Number(company.monthlyTarget) || 1)).map((grantId, pageIndex) => {
                      const index = currentCycleStart(company) + pageIndex;
                      const grant = grantMap[grantId];
                      if (!grant) return null;
                      return (
                        <React.Fragment key={grantId}>
                          <div className="assigned-tab" data-assignment-index={index} onPointerDown={(e) => startAssignedScheduleDrag(e, company.id, grantId, grant.title)} onClick={(e) => e.stopPropagation()}>
                            <div>
                              <div className="assigned-title">{compactAssignedTitle(grant.title)}</div>
                              <div className="assignment-bottom">
                                <span className={ddayClass(grant.deadline)}>{ddayLabel(grant.deadline)}</span>
                                <div className="status-toggle" onPointerDown={(e) => e.stopPropagation()} onClick={(e) => e.stopPropagation()}>
                                  <button className={`status-btn ready ${assignmentStatus(company, grantId) === "ready" ? "active" : ""}`} onClick={(e) => { e.stopPropagation(); updateAssignmentStatus(company.id, grantId, "ready"); }}>준비</button>
                                  <button className={`status-btn done ${assignmentStatus(company, grantId) === "done" ? "active" : ""}`} onClick={(e) => { e.stopPropagation(); updateAssignmentStatus(company.id, grantId, "done"); }}>완료</button>
                                  <button className={`status-btn passed ${assignmentStatus(company, grantId) === "passed" ? "active" : ""}`} onClick={(e) => { e.stopPropagation(); updateAssignmentStatus(company.id, grantId, "passed"); }}>{assignmentResult(company, grantId) ? assignmentResultLabel(assignmentResult(company, grantId)) : "합격"}</button>
                                </div>
                              </div>
                            </div>
                            <button className="remove" title="제거" onClick={(e) => { e.stopPropagation(); removeAssignment(company.id, grantId); }}>×</button>
                          </div>
                        </React.Fragment>
                      );
                    })}
                    {sortedAssignedGrantIds(company, grantMap).slice(currentCycleStart(company), currentCycleStart(company) + (Number(company.monthlyTarget) || 1)).length === 0 && (
                      <div className="cycle-empty-space" data-assignment-index={currentCycleStart(company)}></div>
                    )}
                    {!company.assignedGrantIds.length && <div className="drop-empty empty-drop-space"></div>}
                  </div>
                    </section>
                    );
                  })}
                </div>
              ))}
            </div>
            <div className="calendar-resizer" onPointerDown={startCalendarResize} title="일정표 높이 조절" />
            <section className="calendar-panel" style={{ flex: `0 0 ${calendarHeight}px` }}>
              <div className="calendar-head">
                <div>
                  <h2 className="title">스케줄</h2>
                </div>
                <div className="board-actions">
                  <button className="calendar-icon-btn" title="전체 달력" onClick={() => setShowFullCalendar(true)}>▦</button>
                  {schedulePick && <button className="text-btn" onClick={() => setSchedulePick(null)}>선택 취소</button>}
                </div>
              </div>
              <div className="calendar-grid">
                {calendarDays.map((date) => {
                  const dateSchedules = schedules.filter((item) => item.date === date);
                  const deadlineGrants = deadlineGrantsForDate(date, grants);
                  return (
                    <div className={`calendar-day ${date === todayKey() ? "today" : ""} ${schedulePick ? "selecting" : ""}`} key={date} data-calendar-date={date} onClick={() => addSchedule(date)}>
                      <div className="calendar-date"><span>{shortDateLabel(date)}</span><span className="calendar-weekday">{weekdayLabel(date)}</span></div>
                      <div className="schedule-main-list">
                        {dateSchedules.map((item) => {
                          const company = companies.find((target) => target.id === item.companyId);
                          const grant = grantMap[item.grantId];
                          if (!company) return null;
                          if (item.type === "meeting") {
                            return (
                              <div className="schedule-item schedule-meeting" key={item.id} title="클릭하면 일정 삭제" onClick={(e) => { e.stopPropagation(); removeSchedule(item.id); }}>
                                <span className="meeting-time">{item.time}</span>
                                <span className="meeting-title">{company.name} 미팅</span>
                              </div>
                            );
                          }
                          if (!grant) return null;
                          return (
                            <div className="schedule-item" key={item.id} title="클릭하면 일정 삭제" onClick={(e) => { e.stopPropagation(); removeSchedule(item.id); }}>
                              <div className="schedule-company">{company.name}</div>
                              <div className="schedule-title">{compactAssignedTitle(grant.title)}</div>
                              <div className={`${ddayClass(grant.deadline)} schedule-meta`}>{ddayLabel(grant.deadline)}</div>
                            </div>
                          );
                        })}
                      </div>
                      <div className="deadline-list">
                        {deadlineGrants.map((grant) => (
                          <div className="schedule-item schedule-deadline" key={`deadline-${grant.id}`} title="클릭하면 지원사업 정보" onClick={(e) => { e.stopPropagation(); setViewingGrant(grant); }}>
                            <span className="deadline-label">마감</span>
                            <span className="deadline-title">{compactAssignedTitle(grant.title)}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>
            </React.Fragment>
            )}
          </main>
          {drag && <div className="drag-preview" style={{ left: drag.x, top: drag.y }}><span className="copy-mark">복사</span><div>{drag.title}</div></div>}
          {companyDrag && <div className="company-drag-preview" style={{ left: companyDrag.x, top: companyDrag.y }}>기업 위치 이동<br />{companyDrag.name}</div>}
          {companyDrag?.marker && <div className="company-insert-marker" style={{ left: companyDrag.marker.left, top: companyDrag.marker.top, height: companyDrag.marker.height }} />}
          {toast && <div className="toast">{toast}</div>}
          {viewingGrant && <GrantModal grant={viewingGrant} onClose={() => setViewingGrant(null)} onSave={(form) => { saveGrant(form); setViewingGrant(null); }} onDelete={viewingGrant.id ? (id) => { if (!window.confirm || window.confirm("이 지원사업을 삭제할까요?")) { deleteGrant(id); setViewingGrant(null); notify("삭제됨"); } } : null} />}
          {editingGrant && <GrantModal grant={editingGrant} onClose={() => setEditingGrant(null)} onSave={saveGrant} onDelete={editingGrant.id ? deleteGrant : null} />}
          {editingCompany && <CompanyModal company={editingCompany} onClose={() => setEditingCompany(null)} onSave={saveCompany} onDelete={editingCompany.id ? deleteCompany : null} />}
          {showFullCalendar && (
            <div className="modal-backdrop">
              <div className="modal" style={{ width: "900px" }}>
                <div className="full-calendar-toolbar">
                  <h2 className="month-title">{monthTitle(fullCalendarBase)}</h2>
                  <div className="month-nav">
                    <button className="page-btn" onClick={() => setFullCalendarBase((date) => addMonthsKey(date, -1))}>‹</button>
                    <button className="text-btn overdue-toggle" onClick={() => setFullCalendarBase(todayKey())}>오늘</button>
                    <button className="page-btn" onClick={() => setFullCalendarBase((date) => addMonthsKey(date, 1))}>›</button>
                  </div>
                </div>
                <div className="full-calendar">
                  {["일", "월", "화", "수", "목", "금", "토"].map((day) => <div className="full-weekday" key={day}>{day}</div>)}
                  {fullCalendarDays.map((date) => {
                    const dateSchedules = schedules.filter((item) => item.date === date);
                    const deadlineGrants = deadlineGrantsForDate(date, grants);
                    return (
                      <div className={`full-calendar-day ${date === todayKey() ? "today" : ""} ${isSameMonth(date, fullCalendarBase) ? "" : "out-month"}`} key={date}>
                        <div className="calendar-date"><span>{shortDateLabel(date)}</span></div>
                        <div className="schedule-main-list">
                          {dateSchedules.map((item) => {
                            const company = companies.find((target) => target.id === item.companyId);
                            const grant = grantMap[item.grantId];
                            if (!company) return null;
                            if (item.type === "meeting") {
                              return (
                                <div className="schedule-item schedule-meeting" key={item.id} title="클릭하면 일정 삭제" onClick={() => removeSchedule(item.id)}>
                                  <span className="meeting-time">{item.time}</span>
                                  <span className="meeting-title">{company.name} 미팅</span>
                                </div>
                              );
                            }
                            if (!grant) return null;
                            return (
                              <div className="schedule-item" key={item.id} title="클릭하면 일정 삭제" onClick={() => removeSchedule(item.id)}>
                                <div className="schedule-company">{company.name}</div>
                                <div className="schedule-title">{grant.title}</div>
                              </div>
                            );
                          })}
                        </div>
                        <div className="deadline-list">
                          {deadlineGrants.map((grant) => (
                            <div className="schedule-item schedule-deadline" key={`deadline-${grant.id}`} title="클릭하면 지원사업 정보" onClick={() => setViewingGrant(grant)}>
                              <span className="deadline-label">마감</span>
                              <span className="deadline-title">{grant.title}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div className="modal-actions">
                  <div className="action-right"><button className="text-btn primary" onClick={() => setShowFullCalendar(false)}>닫기</button></div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    function GrantDetailModal({ grant, onClose, onEdit, onSelect, onDelete }) {
      return (
        <div className="modal-backdrop">
          <div className="modal">
            <h2>지원사업 정보</h2>
            <div className="detail-list">
              <div className="detail-item"><span className="detail-label">사업명</span><div className="detail-value">{grant.title || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">마감일</span><div className="detail-value">{grant.deadline || "-"} {grant.deadline ? `(${ddayLabel(grant.deadline)})` : ""}</div></div>
              <div className="detail-item"><span className="detail-label">제출 서류</span><div className="detail-value">{(grant.documentTypes || []).join(", ") || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">지원 규모</span><div className="detail-value">{grant.budget || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">지원 지역</span><div className="detail-value">{grant.region || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">지원 대상 조건</span><div className="detail-value">{grant.condition || "-"}</div></div>
              <div className="detail-item"><span className="detail-label">메모</span><div className="detail-value" dangerouslySetInnerHTML={{ __html: grant.memo || "-" }} /></div>
              <div className="detail-item"><span className="detail-label">공고 링크</span><div className="detail-value">{grant.link || "-"}</div></div>
            </div>
            <div className="modal-actions">
              <div className="action-right">
                <button className="text-btn danger" onClick={onDelete}>삭제</button>
                <button className="text-btn" onClick={onEdit}>수정</button>
                <button className="text-btn primary" onClick={onClose}>닫기</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GrantModal({ grant, onClose, onSave, onDelete }) {
      const initialDocuments = Array.isArray(grant.documentTypes) ? grant.documentTypes : [];
      const [form, setForm] = useState({ title: "", deadline: "", budget: "", region: "", condition: "", link: "", category: "", memo: "", ...grant, documentTypes: initialDocuments });
      const toggleDocumentType = (type) => {
        const current = Array.isArray(form.documentTypes) ? form.documentTypes : [];
        setForm({ ...form, documentTypes: current.includes(type) ? current.filter((item) => item !== type) : [...current, type] });
      };
      return (
        <div className="modal-backdrop" onPointerDown={(event) => { if (event.target === event.currentTarget) onClose(); }}>
          <div className="modal grant-edit-modal" onPointerDown={(event) => event.stopPropagation()}>
            <h2>{form.id ? "지원사업 정보" : "지원사업 추가"}</h2>
            <div className="form-grid">
              <Field label="사업명"><input value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} /></Field>
              <Field label="지원 구분"><select value={form.category || ""} onChange={(e) => setForm({ ...form, category: e.target.value })}><option value="">자동 분류</option>{grantCategories.map((category) => <option key={category} value={category}>{category}</option>)}</select></Field>
              <Field label="제출 서류">
                <div className="check-row">
                  {["IR", "사업계획서"].map((type) => (
                    <button type="button" className={`check-pill ${(form.documentTypes || []).includes(type) ? "selected" : ""}`} key={type} onClick={() => toggleDocumentType(type)}>
                      {type}
                    </button>
                  ))}
                </div>
              </Field>
              <Field label="마감일"><input type="date" value={form.deadline} onChange={(e) => setForm({ ...form, deadline: e.target.value })} /></Field>
              <Field label="지원 규모"><textarea value={form.budget} onChange={(e) => setForm({ ...form, budget: e.target.value })} /></Field>
              <Field label="지원 지역"><input value={form.region} onChange={(e) => setForm({ ...form, region: e.target.value })} /></Field>
              <Field label="지원 대상 조건"><textarea value={form.condition} onChange={(e) => setForm({ ...form, condition: e.target.value })} /></Field>
              <Field label="메모"><RichMemoEditor value={form.memo || ""} onChange={(value) => setForm({ ...form, memo: value })} /></Field>
              <Field label="공고 링크"><input value={form.link} onChange={(e) => setForm({ ...form, link: e.target.value })} /></Field>
            </div>
            <div className="modal-actions">
              {onDelete && <button className="text-btn danger" onClick={() => onDelete(form.id)}>삭제</button>}
              <div className="action-right"><button className="text-btn" onClick={onClose}>취소</button><button className="text-btn primary" disabled={!form.title.trim()} onClick={() => onSave(form)}>저장</button></div>
            </div>
          </div>
        </div>
      );
    }
    function RichMemoEditor({ value, onChange }) {
      const editorRef = useRef(null);
      useEffect(() => {
        const editor = editorRef.current;
        if (editor && document.activeElement !== editor && editor.innerHTML !== value) editor.innerHTML = value || "";
      }, [value]);
      const applyBold = () => {
        editorRef.current?.focus();
        if (document.execCommand) document.execCommand("bold", false, null);
        onChange(editorRef.current?.innerHTML || "");
      };
      return (
        <div>
          <div className="memo-toolbar">
            <button className="memo-bold-btn" type="button" title="굵게 Ctrl+B" onMouseDown={(event) => { event.preventDefault(); applyBold(); }}>B</button>
          </div>
          <div
            className="rich-memo"
            ref={editorRef}
            contentEditable={true}
            suppressContentEditableWarning={true}
            onInput={(event) => onChange(event.currentTarget.innerHTML)}
            onKeyDown={(event) => {
              if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "b") {
                event.preventDefault();
                applyBold();
              }
            }}
          ></div>
        </div>
      );
    }
    function CompanyModal({ company, onClose, onSave, onDelete }) {
      const [form, setForm] = useState({ name: "", memo: "", region: "", foundedDate: "", crmUrl: "", round: 1, monthlyTarget: 3, monthlyDone: 0, assignedGrantIds: [], assignmentStatuses: {}, contractEnded: false, ...company });
      return (
        <div className="modal-backdrop">
          <div className="modal">
            <h2>{form.id ? "기업 수정" : "기업 추가"}</h2>
            <div className="form-grid">
              <Field label="기업명"><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} /></Field>
              <Field label="메모"><textarea value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} /></Field>
              <Field label="창업지역"><input value={form.region} onChange={(e) => setForm({ ...form, region: e.target.value })} /></Field>
              <Field label="창립일자"><input type="date" value={form.foundedDate || ""} onChange={(e) => setForm({ ...form, foundedDate: e.target.value })} /></Field>
              <Field label="업력 자동 판정"><input value={companyAgeLabel(form.foundedDate)} readOnly /></Field>
              <Field label="CRM URL"><input value={form.crmUrl || ""} onChange={(e) => setForm({ ...form, crmUrl: e.target.value })} placeholder="https://..." /></Field>
              <Field label="현재 회차"><input type="number" min="0" value={form.round} onChange={(e) => setForm({ ...form, round: e.target.value })} /></Field>
              <Field label="월 계약 건수"><input type="number" min="1" value={form.monthlyTarget} onChange={(e) => setForm({ ...form, monthlyTarget: e.target.value })} /></Field>
              <label className="toggle-label"><input type="checkbox" checked={!!form.contractEnded} onChange={(e) => setForm({ ...form, contractEnded: e.target.checked })} />계약 종료</label>
            </div>
            <div className="modal-actions">
              {onDelete && <button className="text-btn danger" onClick={() => onDelete(form.id)}>삭제</button>}
              <div className="action-right"><button className="text-btn" onClick={onClose}>취소</button><button className="text-btn primary" disabled={!form.name.trim()} onClick={() => onSave(form)}>저장</button></div>
            </div>
          </div>
        </div>
      );
    }
    function Field({ label, children }) {
      return <div className="field"><label>{label}</label>{children}</div>;
    }
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, message: "" };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, message: error?.message || String(error || "알 수 없는 오류") };
      }
      componentDidCatch(error) {
        console.error("Page render failed", error);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="customer-page">
              <div className="customer-shell">
                <div className="customer-empty">페이지 오류: {this.state.message}</div>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }
    function App() {
      const companyId = requestedCompanyId();
      return companyId ? <CustomerGrantPage companyId={companyId} /> : <StartupGrantBoard />;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
